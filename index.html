<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>肖邦666 - 粉丝综合站</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .logo { font-size: 64px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-10px) } }
    h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
    .sub { color: #94a3b8; margin-bottom: 32px; font-size: 15px; }
    .card {
      background: #1e293b; border: 1px solid #334155; border-radius: 16px;
      padding: 32px 36px; max-width: 440px; width: 100%; text-align: center;
    }
    .status { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .3 } }
    .status-text { color: #94a3b8; font-size: 14px; }
    .btn {
      display: inline-block; background: #3b82f6; color: #fff;
      padding: 15px 40px; border-radius: 12px; font-size: 17px; font-weight: 700;
      text-decoration: none; transition: all .2s; border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(59,130,246,.3);
    }
    .btn:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(59,130,246,.4); }
    .fallback { margin-top: 24px; padding-top: 20px; border-top: 1px solid #334155; }
    .fallback p { color: #64748b; font-size: 13px; margin-bottom: 8px; }
    .fallback code {
      background: #0f172a; padding: 8px 14px; border-radius: 8px; color: #60a5fa;
      font-size: 13px; word-break: break-all; display: inline-block; max-width: 100%;
    }
    .wechat-overlay {
      display: none; position: fixed; overflow:hidden; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15,23,42,0.98); z-index: 9999;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 20px;
    }
    .wechat-overlay.show { display: flex; }
    @keyframes arrow-bounce { 0%,100% { transform: translateY(0) rotate(45deg); } 50% { transform: translateY(-10px) rotate(45deg); } }
    @keyframes pulse-dot { 0%,100% { opacity: 0.4; transform: scale(1) } 50% { opacity: 1; transform: scale(1.3) } }
  </style>
</head>
<body>
  <div class="logo">📈</div>
  <h1>肖邦666 · 粉丝综合站</h1>
  <p class="sub">AI智能分析 · 视频教学库 · 书籍推荐 · 社区交流</p>

  <div class="card">
    <div class="status">
      <div class="dot" id="dot"></div>
      <span class="status-text" id="status">正在连接...</span>
    </div>
    <a href="#" id="goBtn" class="btn" style="display:none">🚀 进入网站</a>
    <div class="fallback" id="fallback" style="display:none">
      <p>自动跳转失败？手动复制地址：</p>
      <code id="manualUrl"></code>
    </div>
  </div>

  <!-- WeChat detection -->
  <div class="wechat-overlay" id="wechatOverlay">
    <div style="position:absolute;top:16px;right:56px;display:flex;align-items:center;gap:6px;animation:arrow-bounce 1s ease-in-out infinite;z-index:10000">
      <span style="color:#fbbf24;font-size:16px;font-weight:800;">点击右上角</span>
      <svg width="42" height="42" viewBox="0 0 48 48" style="transform:rotate(45deg)">
        <line x1="8" y1="8" x2="40" y2="40" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
        <polygon points="40,40 26,30 30,42" fill="#fbbf24"/>
      </svg>
    </div>
    <div style="position:absolute;top:22px;right:18px;display:flex;gap:5px;z-index:10000">
      <span style="display:block;width:10px;height:10px;border-radius:50%;background:#fbbf24;animation:pulse-dot 0.5s infinite 0s"></span>
      <span style="display:block;width:10px;height:10px;border-radius:50%;background:#fbbf24;animation:pulse-dot 0.5s infinite 0.15s"></span>
      <span style="display:block;width:10px;height:10px;border-radius:50%;background:#fbbf24;animation:pulse-dot 0.5s infinite 0.3s"></span>
    </div>
    <img src="cover.jpg" alt="肖邦666" style="max-width:260px;width:65%;margin-bottom:24px;border-radius:12px;">
    <h2 style="margin-bottom:10px;">为保障平台合规运营</h2>
    <p style="color:#94a3b8;max-width:320px;line-height:1.8;margin-bottom:4px;">请点击右上角</p>
    <p style="color:#fbbf24;font-size:20px;font-weight:700;margin:4px 0;">「 ··· 」</p>
    <p style="color:#94a3b8;max-width:320px;line-height:1.8;margin-top:4px;">选择 <strong style="color:#60a5fa;">「在浏览器中打开」</strong></p>
    <div class="tip-box" style="margin-top:20px;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:16px 20px;color:#94a3b8;font-size:13px;">
      或者复制此链接到手机浏览器打开：<br>
      <strong style="color:#60a5fa;word-break:break-all;">xiaobang666.com</strong>
    </div>
  </div>

  <script>
  (function(){
    // WeChat detection
    var ua = navigator.userAgent.toLowerCase();
    if (ua.indexOf('micromessenger') !== -1) {
      document.getElementById('wechatOverlay').classList.add('show');
      return;
    }

    // ★★★ 当前最新隧道地址（每次推送时自动更新） ★★★
    var FALLBACK_URL = 'https://preparation-athletes-environment-river.trycloudflare.com';

    // GitHub Gist 配置 — push-url.py 自动更新
    var GIST_ID = '445b1402494bc2247e6ecf95f236b671';
    var GIST_RAW = 'https://gist.githubusercontent.com/xiaobang666-1941532396/' + GIST_ID + '/raw/target-url.txt';

    var statusEl = document.getElementById('status');
    var goBtn = document.getElementById('goBtn');
    var fallback = document.getElementById('fallback');
    var manualUrl = document.getElementById('manualUrl');
    var dot = document.getElementById('dot');

    function showSuccess(url) {
      statusEl.textContent = '已连接';
      dot.style.background = '#10b981';
      dot.style.animation = 'none';
      goBtn.href = url;
      goBtn.style.display = 'inline-block';
      setTimeout(function() {
        window.location.href = url;
      }, 500);
    }

    function showFallback() {
      // 先尝试 localStorage 缓存
      var cached = localStorage.getItem('fansite_last_url');
      var url = cached || FALLBACK_URL;
      if (url && url.indexOf('trycloudflare.com') !== -1) {
        showSuccess(url);
        return;
      }
      // 最终兜底
      statusEl.textContent = '连接失败，请稍后重试';
      dot.style.background = '#ef4444';
      dot.style.animation = 'none';
      fallback.style.display = 'block';
      manualUrl.textContent = FALLBACK_URL;
      goBtn.href = FALLBACK_URL;
      goBtn.style.display = 'inline-block';
    }

    // 1. 先尝试从 Gist 获取最新地址
    fetch(GIST_RAW + '?t=' + Date.now())
      .then(function(r) {
        if (!r.ok) throw new Error('Gist fetch failed');
        return r.text();
      })
      .then(function(url) {
        url = url.trim();
        if (url && url.indexOf('trycloudflare.com') !== -1) {
          localStorage.setItem('fansite_last_url', url);
          showSuccess(url);
        } else {
          throw new Error('Invalid URL in Gist');
        }
      })
      .catch(function() {
        // 2. Gist 失败 → 使用备用地址
        showFallback();
      });
  })();
  </script>
</body>
</html>
